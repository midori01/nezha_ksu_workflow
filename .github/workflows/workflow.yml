name: Build GKI Kernel with KernelSU Variants v4.4.0

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - resukisu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      enable_telegram:
        description: 'Enable Telegram notifications'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

# All toolchain paths are now resolved at runtime after download.
# CCACHE_DIR points to a location within the workspace so GitHub cache
# can persist it between runs.
env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  TOOLCHAIN_DIR: ${{ github.workspace }}/toolchains

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      build_start_time: ${{ steps.timestamp.outputs.start_time }}
      create_release: ${{ steps.config.outputs.create_release }}
    steps:
      - name: Record Build Start Time
        id: timestamp
        run: |
          echo "WORKFLOW_START_TIME=$(date +%s)" >> $GITHUB_ENV
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "::notice::Workflow started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Set Build Matrix
        id: set-matrix
        run: |
          echo 'matrix={"variant":["resukisu"]}' >> $GITHUB_OUTPUT
          echo "🎯 Building resukisu"

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    # GitHub-hosted runner — large runner gives more RAM/CPU for kernel builds.
    # Falls back to ubuntu-latest if you don't have access to large runners.
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Free Disk Space & Install Build Dependencies
        # The GitHub-hosted runner image ships ~14 GB of pre-installed software
        # we don't need.  We purge it BEFORE apt-get update so the package
        # index download doesn't fail with ENOSPC.
        run: |
          echo "=== Disk before cleanup ==="
          df -h /

          # --- Remove large pre-installed packages ---
          sudo apt-get purge -yq \
            '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-cli google-chrome-stable \
            firefox powershell mono-devel libgl1-mesa-dri \
            'ghc-*' 'cabal-install' \
            || true

          # --- Wipe large directories that apt won't touch ---
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/lib/jvm \
            /usr/local/graalvm \
            "$AGENT_TOOLSDIRECTORY"

          # --- Docker images (if any) ---
          docker image prune -af 2>/dev/null || true

          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Disk after cleanup ==="
          df -h /

          # --- Now safe to update and install ---
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            build-essential binutils-aarch64-linux-gnu \
            python3 python3-pip rsync \
            ccache curl zip unzip git \
            libncurses-dev gawk openssl \
            dwarves zstd pahole cmake libdw-dev
          echo "✅ Dependencies installed"

          # Build pahole from source (Ubuntu ships 1.25, BTF on 6.12 needs 1.26+)
          git clone --depth=1 --branch v1.27 https://git.kernel.org/pub/scm/devel/pahole/pahole.git /tmp/pahole
          cmake -S /tmp/pahole -B /tmp/pahole/build -D__LIB=lib -DCMAKE_INSTALL_PREFIX=/usr
          sudo make -C /tmp/pahole/build install -j$(nproc)
          echo "✅ pahole $(pahole --version)"

          echo "=== Disk after apt install ==="
          df -h /

      - name: Restore ccache
        # Cache key varies per variant so parallel jobs don't stomp each other.
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.variant }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.variant }}-${{ github.ref_name }}-
            ccache-${{ matrix.variant }}-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=1
          echo "ccache version: $(ccache --version | head -1)"

      - name: Download & Verify Clang Toolchain
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz
          rm clang.tar.gz
          echo "✅ $($HOME/clang/bin/clang --version | head -1)"
          echo "CLANG_BIN=$HOME/clang/bin" >> $GITHUB_ENV
          echo "$HOME/clang/bin" >> $GITHUB_PATH


      - name: Download & Verify AArch64 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz
          tar -xJf tc.tar.xz
          rm tc.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*aarch64*)
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          echo "✅ AArch64 toolchain ready: $HOME/toolchains/$TC_DIR"

      - name: Download & Verify ARM32 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz
          rm tc-arm.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*arm-none-eabi*)
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/arm-none-eabi-" >> $GITHUB_ENV
          echo "✅ ARM32 toolchain ready: $HOME/toolchains/$TC_DIR"

      - name: Pre-Clean Build Artifacts
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf AnyKernel3 release-assets changelogs || true

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Smart Sync Kernel & SuSFS Sources
        run: |
          echo "📦 Smart syncing kernel and SuSFS sources..."
          
          # 1. Smart Sync Kernel
          if [ -d "kernel/.git" ]; then
            echo "♻️ Existing Kernel tree found. Factory resetting and updating..."
            cd kernel
            git fetch --depth=1 origin
            git reset --hard origin/HEAD
            git clean -fdx
            cd ..
          else
            echo "📥 Downloading Kernel source..."
            git clone --depth=1 https://github.com/cctv18/android_gki_kernel_common kernel
          fi
              
          # 2. Smart Sync SuSFS
          if [ -d "susfs4ksu/.git" ]; then
            echo "♻️ Existing SuSFS tree found. Factory resetting and updating..."
            cd susfs4ksu
            git fetch --depth=1 origin gki-android16-6.12-dev
            git reset --hard origin/gki-android16-6.12-dev
            git clean -fdx
            cd ..
          else
            echo "📥 Downloading SuSFS source..."
            git clone --depth=1 --branch=gki-android16-6.12-dev https://gitlab.com/simonpunk/susfs4ksu susfs4ksu
          fi

      - name: Store Commit Info (Workflow, Kernel, SuSFS)
        run: |
          # Workflow
          read -r W_HASH W_SHORT W_DATE W_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "WORKFLOW_COMMIT_SHORT=$W_SHORT" >> $GITHUB_ENV && echo "WORKFLOW_COMMIT_MSG=$W_MSG" >> $GITHUB_ENV
          
          # Kernel
          cd kernel
          read -r K_HASH K_SHORT K_DATE K_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "KERNEL_COMMIT_SHORT=$K_SHORT" >> $GITHUB_ENV && echo "KERNEL_COMMIT_MSG=$K_MSG" >> $GITHUB_ENV
          
          # SuSFS
          cd ../susfs4ksu
          read -r S_HASH S_SHORT S_DATE S_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "SUSFS_COMMIT_SHORT=$S_SHORT" >> $GITHUB_ENV && echo "SUSFS_COMMIT_MSG=$S_MSG" >> $GITHUB_ENV

      - name: Show CCACHE Status
        run: |
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          ccache -s | grep -E "(Cacheable calls|Hits|Misses|Hit rate|cache size)" || true

      - name: Setup KernelSU Variant
        run: |
          KSU_SETUP_START=$SECONDS
          # Nuke the rogue KernelSU-Next folder as well to clean up the runner
          cd kernel && rm -rf KernelSU drivers/kernelsu KernelSU-Next
          
          case "${{ matrix.variant }}" in
            "resukisu") KSU_REPO="ReSukiSU/ReSukiSU"; KSU_BRANCH="main"; USE_SETUP_SH="true" ;;
          esac
          
          git clone --depth=1 --branch=$KSU_BRANCH https://github.com/$KSU_REPO.git KernelSU
          
          # We manually integrate KSU to prevent fork setup scripts from rogue cloning
          if [ "$USE_SETUP_SH" = "true" ]; then
            echo "🔗 Manually symlinking KernelSU..."
            ln -sf ../KernelSU/kernel drivers/kernelsu
          else
            echo "📋 Manually copying KernelSU (No symlink)..."
            cp -r KernelSU/kernel drivers/kernelsu
          fi
          
          # Add KSU to kernel makefiles
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          
          echo "KSU_REPO=$KSU_REPO" >> $GITHUB_ENV && echo "KSU_BRANCH=$KSU_BRANCH" >> $GITHUB_ENV
          echo "KSU_SETUP_TIME=$((SECONDS - KSU_SETUP_START))s" >> $GITHUB_ENV

      - name: Get KSU Version Info & Commit
        run: |
          cd kernel/KernelSU
          git fetch --unshallow --quiet || git fetch --depth=10000 --quiet || true
          
          if [ "${{ matrix.variant }}" = "resukisu" ]; then
            git fetch origin main:main --quiet || true
            KSU_COUNT=$(git rev-list --count main)
            KSU_VERSION=$((40000 + KSU_COUNT - 2815))
          fi
          
          read -r KSU_C_HASH KSU_C_SHORT KSU_C_DATE KSU_C_MSG KSU_C_AUTH << EOF
          $(git log -1 --format="%H %h %cd %s %an" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHORT=$KSU_C_SHORT" >> $GITHUB_ENV
          echo "KSU_COMMIT_MSG=$KSU_C_MSG" >> $GITHUB_ENV

      - name: Generate Comprehensive Changelog
        if: needs.setup.outputs.create_release == 'true'
        run: |
          mkdir -p changelogs
          CHANGELOG_FILE="changelogs/CHANGELOG-${{ matrix.variant }}.md"
          
          cat << EOF > "$CHANGELOG_FILE"
          # 📋 Comprehensive Build Changelog
          
          **Variant:** ${{ matrix.variant }}
          **Build Number:** #${{ github.run_number }}
          **KernelSU Version:** r${{ env.KSU_VERSION }}
          **SuSFS:** ${{ env.ENABLE_SUSFS == 'true' && 'Enabled' || 'Disabled' }}
          
          ---
          ## 📖 Component Versions
          | Component | Current Commit | Date | Summary |
          |-----------|---------------|------|---------|
          | **KernelSU** | \`${{ env.KSU_COMMIT_SHORT }}\` | $(date) | ${{ env.KSU_COMMIT_MSG }} |
          | **Kernel** | \`${{ env.KERNEL_COMMIT_SHORT }}\` | $(date) | ${{ env.KERNEL_COMMIT_MSG }} |
          | **SuSFS4KSU** | \`${{ env.SUSFS_COMMIT_SHORT }}\` | $(date) | ${{ env.SUSFS_COMMIT_MSG }} |
          
          ---
          EOF
          
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_ENV

      - name: Setup SuSFS
        if: env.ENABLE_SUSFS == 'true'
        run: |
          cp susfs4ksu/kernel_patches/fs/susfs.c kernel/fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h kernel/include/linux/
          cp susfs4ksu/kernel_patches/include/linux/susfs_def.h kernel/include/linux/
          
          cd kernel
          
          # Apply core SuSFS patch
          VARIANT_SUSFS_PATCH="../.github/patches/${{ matrix.variant }}/50_add_susfs_in_gki-android16-6.12.patch"
          DEFAULT_SUSFS_PATCH="../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"
          
          if [ -f "$VARIANT_SUSFS_PATCH" ]; then
            echo "📋 Applying CUSTOM core SuSFS patch from .github/patches/${{ matrix.variant }}/..."
            patch -p1 --forward < "$VARIANT_SUSFS_PATCH" || echo "⚠️ Patch failed or already applied."
          else
            echo "📋 Applying DEFAULT core SuSFS patch..."
            patch -p1 --forward < "$DEFAULT_SUSFS_PATCH" || echo "⚠️ Patch failed or already applied."
          fi
          
          # Apply KSU specific SuSFS patch (Skip for branches with SuSFS pre-integrated)
          if [ "${{ matrix.variant }}" != "resukisu" ]; then
            cd KernelSU
            
            VARIANT_KSU_PATCH="../../.github/patches/${{ matrix.variant }}/10_enable_susfs_for_ksu.patch"
            DEFAULT_KSU_PATCH="../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
            
            if [ -f "$VARIANT_KSU_PATCH" ]; then
              echo "📋 Applying CUSTOM 10_enable_susfs_for_ksu patch from .github/patches/${{ matrix.variant }}/..."
              patch -p1 --forward < "$VARIANT_KSU_PATCH" || echo "❌ KSU SuSFS Patch Failed!"
            else
              echo "📋 Applying DEFAULT 10_enable_susfs_for_ksu patch..."
              patch -p1 --forward < "$DEFAULT_KSU_PATCH" || echo "❌ KSU SuSFS Patch Failed!"
            fi
            
          fi

      - name: Apply Remote Patches & Source Fixes
        run: |
          cd kernel
          
          # 0. Bypass GKI ABI symbol checks
          echo "🚫 Removing GKI protected exports..."
          rm -f android/abi_gki_protected_exports_* || true
          
          # 1. CLIDR uninitialized fix
          curl -LSs "https://raw.githubusercontent.com/infectedmushi/kernel_patches/main/fix-clidr-uninitialized.patch" -o /tmp/fix-clidr.patch
          patch -p1 --forward < /tmp/fix-clidr.patch || true
          
          # 2. Fix localversion script appending dirty flags
          sed -i '/# Check for uncommitted changes\./,/fi/d' ./scripts/setlocalversion
          
          # 3. Fix libbpf compilation error
          echo "🔧 Patching libbpf.c type casting..."
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' tools/lib/bpf/libbpf.c

      - name: Configure Kernel
        run: |
          cd kernel
          export ARCH=arm64
          # CLANG_BIN is already in PATH via $GITHUB_PATH (set in the Download Clang step)
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out gki_defconfig
          
          # Append all custom GKI, Tensor G3, Net, and KSU configs via cleanly formatted heredoc
          cat << 'EOF' >> out/.config
          CONFIG_ARM64_CORTEX_X3=y
          CONFIG_ARM64_CORTEX_A715=y
          CONFIG_ARM64_CORTEX_A510=y
          CONFIG_ARM64_VA_BITS=48
          CONFIG_ARM64_PA_BITS=48
          CONFIG_SCHED_MC=y
          CONFIG_SCHED_CORE=y
          CONFIG_ENERGY_MODEL=y
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_THERMAL=y
          CONFIG_CMA=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_LTO_CLANG_THIN=y
          CONFIG_IP_SET=y
          CONFIG_NET_SCH_CAKE=y
          CONFIG_KSU=y
          CONFIG_LOCALVERSION="-deepongi+"
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          EOF
          
          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            cat << 'EOF' >> out/.config
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF
          fi
          
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out olddefconfig

      - name: Build Kernel (Make)
        run: |
          cd kernel
          export ARCH=arm64
          # CLANG_BIN is already in PATH via $GITHUB_PATH (set in the Download Clang step)
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CC="ccache clang"
          export CXX="ccache clang++"
          
          MAKE_JOBS=$(nproc)
          START_TIME=$SECONDS
          
          if [ "${{ env.FORCE_CLEAN }}" = "true" ]; then
            make -j$MAKE_JOBS LLVM=1 LLVM_IAS=1 LD=ld.lld O=out clean
          fi
          
          # Build — matches the proven reference invocation
          make -j$MAKE_JOBS \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}" \
            CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}" \
            CC="$CC" \
            KCFLAGS="-fno-stack-protector" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out
          
          echo "BUILD_TIME=$((SECONDS - START_TIME))s" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          cd kernel
          KERNEL_VERSION=$(grep "^VERSION" Makefile | cut -d' ' -f3).$(grep "^PATCHLEVEL" Makefile | cut -d' ' -f3).$(grep "^SUBLEVEL" Makefile | cut -d' ' -f3)
          cd ..
          
          case "${{ matrix.variant }}" in
            "resukisu") AK3_BRANCH="resukisu" ;;
          esac
          
          git clone --depth=1 --branch=$AK3_BRANCH https://github.com/deepongi-labs/AnyKernel3-p8a AnyKernel3 || git clone --depth=1 --branch=main https://github.com/deepongi-labs/AnyKernel3-p8a AnyKernel3
          
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          [ -f kernel/out/arch/arm64/boot/dtb ] && cp kernel/out/arch/arm64/boot/dtb AnyKernel3/
          
          cd AnyKernel3 && rm -rf .git .github
          ZIP_NAME="AK3-${KERNEL_VERSION}-${{ matrix.variant }}-r${{ env.KSU_VERSION }}.zip"
          zip -r9 "../$ZIP_NAME" .
          cd ..
          
          echo "KERNEL_ZIP=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}-${{ github.run_number }}
          path: |
            ${{ env.KERNEL_ZIP }}
            ${{ env.CHANGELOG_FILE }}

  create_release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: always() && needs.setup.outputs.create_release == 'true' && needs.build.result != 'cancelled'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        run: |
          cd release-assets
          find . -type f -exec mv {} . \; 2>/dev/null || true
          
          # Safety check: Only create release if at least one ZIP was actually built
          if ! ls *.zip 1> /dev/null 2>&1; then
            echo "❌ No ZIP artifacts found! All matrix builds must have failed. Skipping release."
            exit 0
          fi
          
          RELEASE_NOTES="**Build Date:** $(date)
          **SuSFS:** ${{ inputs.disable_susfs == true && '❌ Disabled' || '✅ Enabled' }}
          
          ### Devices Supported
          - Pixel 8, 8a, 8 Pro
          
          Flash ZIP in Kernel Flasher or extract Image to patch boot.img manually."
          
          gh release create "build-${{ github.run_number }}" \
            --title "Android 14 Kernel Build #${{ github.run_number }}" \
            --notes "$RELEASE_NOTES" \
            --repo "${{ github.repository }}" \
            ./*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [setup, create_release, build]
    runs-on: ubuntu-latest
    if: always() && inputs.enable_telegram
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="${{ needs.build.result }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="⚠️"
          [ "$STATUS" == "failure" ] && ICON="❌"
          
          # Format variables
          IS_CLEAN="${{ inputs.force_clean_build == true && 'Yes' || 'No' }}"
          IS_SUSFS="${{ inputs.disable_susfs == true && 'Disabled' || 'Enabled' }}"
          DO_REL="${{ inputs.create_release == true && 'Yes' || 'No' }}"
          
          # Use HTML parsing to completely avoid Markdown character breaking (hyphens/underscores)
          cat << EOF > tg_message.txt
          $ICON <b>Kernel Build ${STATUS^^}</b>
          ━━━━━━━━━━━━━━━━━━━━━
          📱 <b>Target:</b> Pixel 8 / 8a / 8 Pro
          🛠️ <b>Variant(s):</b> ${{ inputs.ksu_variant }}
          🛡️ <b>SuSFS:</b> $IS_SUSFS
          🧹 <b>Clean Build:</b> $IS_CLEAN
          📦 <b>Release Created:</b> $DO_REL
          👤 <b>Triggered by:</b> <a href="https://github.com/${{ github.actor }}">${{ github.actor }}</a>
          
          🔗 <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run Logs & Artifacts</a>
          EOF
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$(cat tg_message.txt)" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true