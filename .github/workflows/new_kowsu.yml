name: 加速版构建 6.12.23 欧加真OKI内核 (KowSU Port)

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.12'
  SUB_VERSION: '23'
  KERNEL_NAME: 'android16-5-ga8f88ad96df3-ab13929693-4k'
  CCACHE_KEY: ccache-neov5-6.12.23

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU 分支 (KowSU/None)'
        required: true
        type: choice
        default: 'kowsu'
        options:
          - 'kowsu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: 'true'
      # ... other inputs (lz4, bbr, adios, etc.) are kept from fastbuild.yml ...
      baseband_guard:
        description: '是否开启内核级基带保护'
        required: true
        type: boolean
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 安装环境依赖 (Oppo Fast Build)
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev libdw-dev aria2
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache
          sudo cp -f ./ccache /usr/bin/ccache && sudo chmod +x /usr/bin/ccache && rm -f ./ccache
          
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip && mv "android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15" common && rm -rf common.zip
          
          mkdir -p clang19 rust
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19 && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip
          unzip -q rust.zip -d rust && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && rm -rf *.zip

      - name: Setup KowSU (Integration from build-kowsu.yml)
        id: ksu_version
        if: github.event.inputs.ksu_type == 'kowsu'
        run: |
          cd kernel_workspace/common
          echo "📥 Integrating KowSU via KOWX712/KernelSU..."
          KERNEL_DIR="$(pwd)" bash <(curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/master/kernel/setup.sh") master
          
          cd KernelSU
          git fetch --unshallow || true
          KSU_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          KSU_VERSION=$((KSU_COUNT + 30000))
          echo "KSUVER=r$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=r$KSU_VERSION" >> $GITHUB_OUTPUT

      - name: Apply SuSFS patches (Correct Patch Port)
        if: inputs.susfs_enable && github.event.inputs.ksu_type == 'kowsu'
        run: |
          cd kernel_workspace
          # Clone necessary patch repos
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git patches

          COMMON_DIR="$(pwd)/common"
          SUSFS_DIR="$(pwd)/susfs4ksu"
          PATCHES_DIR="$(pwd)/patches"
          PATCH_NAME="50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch"

          # 1. Copy SuSFS source files
          cp "$SUSFS_DIR/kernel_patches/fs/"* "$COMMON_DIR/fs/"
          cp "$SUSFS_DIR/kernel_patches/include/linux/"* "$COMMON_DIR/include/linux/"

          # 2. Apply core GKI SuSFS patch
          cp "$SUSFS_DIR/kernel_patches/$PATCH_NAME" "$COMMON_DIR/"
          cd "$COMMON_DIR"
          echo "📋 Applying $PATCH_NAME..."
          patch -p1 -F 3 < "$PATCH_NAME" || echo "⚠️ Core SuSFS patch warning"

          # 3. Apply the KowSU specific enablement patch from yapixel/kernel_patches
          cd "$COMMON_DIR/KernelSU"
          echo "📋 Applying 10_enable_susfs_for_ksu.patch (kowsu specific)..."
          cp "$PATCHES_DIR/kowsu/10_enable_susfs_for_ksu.patch" ./
          patch -p1 < 10_enable_susfs_for_ksu.patch || { echo "❌ KowSU SuSFS patch failed!"; exit 1; }

      - name: 内核功能优化 (Defconfig)
        run: |
          cd kernel_workspace/common
          if [[ "${{ github.event.inputs.baseband_guard }}" == "true" ]]; then
            sed -i 's/bool "Oplus Baseband Guard"/bool "Oplus Baseband Guard"\n\tdefault y/' ./drivers/soc/oplus/oplus_project/Kconfig || true
          fi
          if [[ "${{ github.event.inputs.ksu_type }}" == "kowsu" ]]; then
            echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> arch/arm64/configs/gki_defconfig
          fi
          if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
            printf 'CONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\nCONFIG_KSU_SUSFS_SUS_KSTAT=y\nCONFIG_KSU_SUSFS_SPOOF_UNAME=y\nCONFIG_KSU_SUSFS_ENABLE_LOG=y\n' >> arch/arm64/configs/gki_defconfig
          fi

      - name: 构建内核 (Oppo Fast Build Process)
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib"
          cd kernel_workspace/common
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out Image

      - name: 打包 AnyKernel3
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          AK3_NAME="AnyKernel3-KowSU-${{ env.KSUVER }}-${{ env.KERNEL_VERSION }}.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: 上传工件
        uses: actions/upload-artifact@v7
        with:
          path: kernel_workspace/AnyKernel*.zip
          name: kernel-artifact

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载工件
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifact
          path: ./release_zips
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: KowSU-r${{ needs.build.outputs.ksuver }}-${{ github.run_id }}
          name: "GKI ${{ env.KERNEL_VERSION }} | KowSU ${{ needs.build.outputs.ksuver }}"
          body: |
            ### Build Information
            - **Variant**: KowSU (KOWX712)
            - **KSU Version**: ${{ needs.build.outputs.ksuver }}
            - **SuSFS**: ${{ github.event.inputs.susfs_enable }}
          files: release_zips/*.zip
