name: Build GKI Kernel Main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options: [all, kowsu, xxksu]
      gki_version:
        description: 'Target GKI Version'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - '6.12.23 (2025-06)'
          - '6.12.30 (2025-07)'
          - '6.12.38 (2025-09)'
          - '6.12.58 (2025-12)'
          - '6.12.69 (2026-03)'
          - '6.12.X (lts)'
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  # 1. PREPARE: Logic to parse "all" into actual lists for the matrix
  setup:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.set-params.outputs.variants }}
      versions: ${{ steps.set-params.outputs.versions }}
    steps:
      - id: set-params
        run: |
          # Handle Variants
          if [ "${{ inputs.ksu_variant }}" = "all" ]; then
            echo 'variants=["kowsu", "xxksu"]' >> $GITHUB_OUTPUT
          else
            echo 'variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi

          # Handle Versions
          if [ "${{ inputs.gki_version }}" = "all" ]; then
            echo 'versions=[{"sub":"23","patch":"2025-06"},{"sub":"30","patch":"2025-07"},{"sub":"38","patch":"2025-09"},{"sub":"58","patch":"2025-12"},{"sub":"69","patch":"2026-03"},{"sub":"X","patch":"lts"}]' >> $GITHUB_OUTPUT
          else
            # Extract sub and patch from string like '6.12.23 (2025-06)'
            SUB=$(echo "${{ inputs.gki_version }}" | cut -d'.' -f3 | cut -d' ' -f1)
            PATCH=$(echo "${{ inputs.gki_version }}" | cut -d'(' -f2 | cut -d')' -f1)
            echo "versions=[{\"sub\":\"$SUB\",\"patch\":\"$PATCH\"}]" >> $GITHUB_OUTPUT
          fi

  # 2. BUILD: Parallel execution based on the setup output
  build-a16-6-12:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.variants) }}
        version: ${{ fromJson(needs.setup.outputs.versions) }}
    
    uses: ./.github/workflows/kernel-a16-6-12.yml
    secrets: inherit
    with:
      ksu_variant: ${{ matrix.variant }}
      sub_level: ${{ matrix.version.sub }}
      os_patch_level: ${{ matrix.version.patch }}
      enable_susfs: ${{ matrix.variant == 'kowsu' && !inputs.disable_susfs }}
      create_release: ${{ inputs.create_release }}

   # 3. RELEASE: Runs once after ALL builds are finished
  publish:
    needs: [setup, build-a16-6-12]
    # Check if any build succeeded and user wants a release
    if: ${{ success() && inputs.create_release == true }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      release_tag: ${{ needs.setup.outputs.release_tag }}
      # Pass these so the release notes know what the user requested
      gki_version: ${{ inputs.gki_version }}
      variant_input: ${{ inputs.ksu_variant }}
