name: Build GKI Kernel android16-6.12 xxksu susfs

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu
          - xxksu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      android_version:
        description: 'Android version (e.g. android16)'
        required: true
        default: 'android16'
        type: string
      kernel_version:
        description: 'Kernel version (e.g. 6.12)'
        required: true
        default: '6.12'
        type: string
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      os_patch_level:
        description: 'OS patch level (e.g. 2025-05-exp)'
        required: true
        default: '2025-05-exp'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  KERNEL_ROOT: ${{ github.workspace }}/kernel-repo

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      build_start_time: ${{ steps.timestamp.outputs.start_time }}
      create_release: ${{ steps.config.outputs.create_release }}
    steps:
      - name: Record Build Start Time
        id: timestamp
        run: |
          echo "WORKFLOW_START_TIME=$(date +%s)" >> $GITHUB_ENV
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "::notice::Workflow started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Set Build Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"
          if [ "$VARIANT" = "all" ]; then
            echo 'matrix={"variant":["kowsu","xxksu"]}' >> $GITHUB_OUTPUT
            echo "🎯 Building all variants: kowsu, xxksu"
          else
            echo "matrix={\"variant\":[\"$VARIANT\"]}" >> $GITHUB_OUTPUT
            echo "🎯 Building single variant: $VARIANT"
          fi

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Free Disk Space & Install Build Dependencies
        run: |
          sudo apt-get purge -yq '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri 'ghc-*' 'cabal-install' || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /usr/local/graalvm "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af 2>/dev/null || true
          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bc bison flex libssl-dev libelf-dev build-essential python3 python3-pip rsync curl git zip unzip libncurses-dev gawk dwarves zstd pahole kmod

      - name: Install repo
        run: |
          mkdir -p "$HOME/bin"
          curl -LSs https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.email "ci@github.actions"
          git config --global user.name  "GitHub Actions"

      - name: Pre-Clean Build Artifacts
        run: rm -rf AnyKernel3 release-assets changelogs || true

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Sync Kernel Sources
        run: |
          ANDROID_VERSION="${{ github.event.inputs.android_version }}"
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
          OS_PATCH_LEVEL="${{ github.event.inputs.os_patch_level }}"
          FORMATTED_BRANCH="${ANDROID_VERSION}-${KERNEL_VERSION}-${OS_PATCH_LEVEL}"
          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b "common-${FORMATTED_BRANCH}"
          repo sync -c -j$(nproc --all) --no-tags --fail-fast --force-sync --no-clone-bundle
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV

      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12-dev https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          git -C "$SUSFS_DIR" reset --hard 315af1ddffcfc946cdcc548fd1a51a737e4e9001
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV

      - name: Store Commit Info
        run: |
          echo "WORKFLOW_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          cd "${{ env.KERNEL_DIR }}"
          echo "KERNEL_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "KERNEL_COMMIT_MSG=$(git log -1 --format=%s)" >> $GITHUB_ENV
          cd "${{ env.SUSFS_DIR }}"
          echo "SUSFS_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "SUSFS_COMMIT_MSG=$(git log -1 --format=%s)" >> $GITHUB_ENV

      - name: Setup KernelSU Variant
        run: |
          cd "${{ env.KERNEL_DIR }}"
          rm -rf KernelSU drivers/kernelsu KernelSU-Next
          case "${{ matrix.variant }}" in
            "kowsu")
              git clone --depth=1 https://github.com/KOWX712/KernelSU.git KernelSU
              ln -sf ../KernelSU/kernel drivers/kernelsu
              echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
              sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
              ;;
            "xxksu")
              curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s -- master
              ;;
          esac

      - name: Get KSU Version Info
        run: |
          cd "${{ env.KERNEL_DIR }}/KernelSU"
          if [ "${{ matrix.variant }}" = "xxksu" ]; then
            KSU_VERSION=$(grep -oP 'KSU_VERSION=\K[0-9]+' kernel/Makefile 2>/dev/null || echo "30000")
          else
            KSU_VERSION=$(($(git rev-list --count HEAD) + 30000))
          fi
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "KSU_COMMIT_MSG=$(git log -1 --format=%s)" >> $GITHUB_ENV

      - name: Generate Changelog
        if: needs.setup.outputs.create_release == 'true'
        run: |
          mkdir -p changelogs
          CHANGELOG_FILE="changelogs/CHANGELOG-${{ matrix.variant }}.md"
          cat << EOF > "$CHANGELOG_FILE"
          # 📋 Build Changelog
          **Variant:** ${{ matrix.variant }}
          **Build Number:** #${{ github.run_number }}
          **KernelSU Version:** r${{ env.KSU_VERSION }}
          **SuSFS:** ${{ env.ENABLE_SUSFS == 'true' && 'Enabled' || 'Disabled' }}
          ---
          | Component | Commit | Summary |
          |-----------|--------|---------|
          | **KernelSU** | \`${{ env.KSU_COMMIT_SHORT }}\` | ${{ env.KSU_COMMIT_MSG }} |
          | **Kernel** | \`${{ env.KERNEL_COMMIT_SHORT }}\` | ${{ env.KERNEL_COMMIT_MSG }} |
          EOF
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_ENV

      - name: Setup SuSFS
        if: env.ENABLE_SUSFS == 'true'
        run: |
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" "${{ env.KERNEL_DIR }}/fs/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" "${{ env.KERNEL_DIR }}/include/linux/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" "${{ env.KERNEL_DIR }}/include/linux/"
          cd "${{ env.KERNEL_DIR }}"
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch" || true
          cd KernelSU
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true

      - name: Apply Manual Hooks Patches (xxKSU only)
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/manual-security-hooks-v1.8.patch" || exit 1
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/scope-min-hooks-v1.9.patch" || exit 1

      - name: Apply Source Fixes
        run: |
          cd "${{ env.KERNEL_DIR }}"
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${{ github.event.inputs.sub_level }}/" Makefile
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' tools/lib/bpf/libbpf.c || true

      - name: Write Defconfig Fragment
        run: |
          FRAGMENT="${{ env.KERNEL_DIR }}/arch/arm64/configs/ksu_susfs.fragment"
          printf 'CONFIG_KSU=y\nCONFIG_KSU_DEBUG=n\n' > "$FRAGMENT"
          if [ "${{ matrix.variant }}" = "xxksu" ]; then
            printf 'CONFIG_KSU_EXTRAS=y\nCONFIG_KSU_LSM_SECURITY_HOOKS=n\nCONFIG_KSU_TAMPER_SYSCALL_TABLE=n\n' >> "$FRAGMENT"
          fi
          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            printf 'CONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> "$FRAGMENT"
          fi
          echo "FRAGMENT=$FRAGMENT" >> $GITHUB_ENV

      - name: Download Toolchains
        run: |
          mkdir -p $HOME/clang && cd $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz -O clang.tar.gz && tar -xzf clang.tar.gz
          echo "CLANG_BIN=$HOME/clang/bin" >> $GITHUB_ENV
          echo "$HOME/clang/bin" >> $GITHUB_PATH
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz && tar -xJf tc.tar.xz
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$(ls -d arm-gnu-toolchain-*aarch64*)/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV

      - name: Configure and Build Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          make ARCH=arm64 LLVM=1 O=out gki_defconfig
          cat "${{ env.FRAGMENT }}" >> out/.config
          make ARCH=arm64 LLVM=1 O=out olddefconfig
          make -j$(nproc) ARCH=arm64 LLVM=1 O=out
          echo "DIST_DIR=${{ env.KERNEL_DIR }}/out/arch/arm64/boot" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          git clone --depth=1 --branch=gki-2.0 https://github.com/WildKernels/AnyKernel3 AnyKernel3
          cp "${{ env.DIST_DIR }}/Image" AnyKernel3/
          cd AnyKernel3 && zip -r9 "../AK3-${{ matrix.variant }}.zip" .
          echo "KERNEL_ZIP=AK3-${{ matrix.variant }}.zip" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: "*.zip"

  create_release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: always() && needs.setup.outputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create GitHub Release
        run: |
          find release-assets -type f -name "*.zip" -exec mv {} . \;
          if ! ls *.zip >/dev/null 2>&1; then exit 0; fi
          
          cat << 'EOF' > release_notes.md
          ### Build Details
          - **Kernel:** GKI ${{ github.event.inputs.kernel_version }}
          - **SuSFS:** ${{ github.event.inputs.disable_susfs == 'true' && 'Disabled' || 'Enabled' }}
          - **Device:** Xiaomi 17 Pro Max (popsicle)
          EOF

          gh release create "popsicle-build-${{ github.run_number }}" \
            --title "Build #${{ github.run_number }}" \
            --notes-file release_notes.md \
            ./*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
